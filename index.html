<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diecast Post Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
        <div class="p-6 font-bold text-xl italic">Diecast Tracker</div>
        <nav class="p-4 space-y-2">
            <button onclick="window.switchPage('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">Dashboard</button>
            <button onclick="window.switchPage('posts')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">Manage Posts</button>
            <button onclick="window.switchPage('bidders')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">Bidders</button>
            <button onclick="window.switchPage('settings')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">Settings</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center px-8 justify-between">
            <h2 id="page-title" class="text-lg font-bold">Loading...</h2>
            <div id="auth-status" class="text-xs font-bold px-2 py-1 bg-amber-100 text-amber-800 rounded">Guest</div>
        </header>
        <div id="content-area" class="flex-1 overflow-y-auto p-8">Loading Database...</div>
    </main>

    <div id="modal-container" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, linkWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtNDbpP1AfsqZPBkMeBbP-U_Y2owRc4Js",
            authDomain: "facebook-auction-tracker.firebaseapp.com",
            projectId: "facebook-auction-tracker",
            storageBucket: "facebook-auction-tracker.firebasestorage.app",
            messagingSenderId: "936018615344",
            appId: "1:936018615344:web:91a29634684467ba5121f5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let state = { currentPage: 'dashboard', posts: [], items: [], bidders: [], brands: [] };

        // --- Core Business Logic ---
        function saveState() {
            if (auth.currentUser) setDoc(doc(db, 'users', auth.currentUser.uid), state).catch(console.error);
        }

        function switchPage(page) {
            state.currentPage = page;
            document.getElementById('page-title').innerText = page.charAt(0).toUpperCase() + page.slice(1);
            renderCurrentPage();
        }

        function renderCurrentPage() {
            const el = document.getElementById('content-area');
            if(!el) return;
            el.innerHTML = `<h2 class="text-2xl font-bold capitalize">${state.currentPage}</h2>
            <div class="mt-4 p-4 bg-white rounded border">
                <p>Items: ${state.items.length}</p>
                ${state.currentPage === 'settings' ? `<button onclick="window.signInWithGoogle()" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded-lg">Sync with Google</button>` : ''}
            </div>`;
        }

        function applyReportFilter() { console.log("Filtering..."); }
        function setTheme(t) { state.theme = t; saveState(); }
        function togglePaid(id) {}
        function markBoxPaid(id) {}
        function shipBox(id) {}
        function resetData() {}
        function updateShippingFee(f, sub) {}
        function processShipment(id) {}
        function markSold(id) {}
        function reopenItem(id) {}
        function openModal(t, d) {}
        function closeModal() {}
        function submitForm(e, t, id) {}
        function viewPost(id) {}
        function closePostView() {}
        function downloadPickListCSV() {}
        function updatePaymentLink(l) {}
        function copyInvoice(id, el) {}
        function updateStoreName(n) {}
        function confirmDelete(t, id) {}
        function executeDelete(t, id) {}
        function handleSearch(q) {}
        function closeSearch() {}
        function selectBidder(id) {}
        async function signInWithGoogle() { 
            try {
                if (auth.currentUser?.isAnonymous) await linkWithPopup(auth.currentUser, provider);
                else await signInWithPopup(auth, provider);
            } catch(e) { console.error(e); }
        }
        function logoutAccount() { signOut(auth); }

        // --- Window Bindings ---
        window.switchPage = switchPage;
        window.applyReportFilter = applyReportFilter;
        window.signInWithGoogle = signInWithGoogle;
        window.logoutAccount = logoutAccount;
        window.setTheme = setTheme;

        // --- App Initialization ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-status').innerText = user.isAnonymous ? "Guest Mode" : "Google Secured";
                onSnapshot(doc(db, 'users', user.uid), (snap) => {
                    if (snap.exists()) {
                        state = snap.data();
                        renderCurrentPage();
                    }
                }, (err) => {
                    document.getElementById('content-area').innerHTML = `<div class="p-8 text-rose-500 font-bold">Error loading database: ${err.message}</div>`;
                });
            } else {
                signInAnonymously(auth);
            }
        });

        switchPage('dashboard');
    </script>
</body>
</html>
