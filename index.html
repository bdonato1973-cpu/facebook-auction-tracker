<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diecast Post Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151f32',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Modal Animation */
        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Print Styles for 4x6 Label */
        @media print {
            body { background: white !important; color: black !important; }
            aside, header, #modal-container, .no-print { display: none !important; }
            main, #content-area { overflow: visible !important; height: auto !important; padding: 0 !important; display: block !important; }
            #printable-area {
                position: fixed !important;
                top: 0; left: 0;
                width: 4in !important;
                height: 6in !important;
                margin: 0 !important;
                padding: 0.2in !important;
                box-shadow: none !important;
                border: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 font-sans h-screen flex overflow-hidden transition-colors duration-200">

    <!-- Sidebar Navigation -->
    <aside class="w-20 lg:w-64 bg-white dark:bg-slate-850 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between transition-colors duration-200 shrink-0">
        <div>
            <div class="h-16 flex items-center justify-center lg:justify-start lg:px-6 border-b border-slate-200 dark:border-slate-800">
                <i class="ph-fill ph-car-profile text-3xl text-indigo-600 dark:text-indigo-400"></i>
                <span class="hidden lg:block ml-3 font-bold text-xl tracking-tight">Sales Tracker</span>
            </div>
            <nav class="p-4 space-y-2 mt-4" id="main-nav">
                <button data-page="dashboard" onclick="window.switchPage('dashboard')" class="nav-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
                    <i class="ph ph-squares-four text-2xl"></i>
                    <span class="hidden lg:block ml-3 font-medium">Dashboard</span>
                </button>
                <button data-page="posts" onclick="window.switchPage('posts')" class="nav-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
                    <i class="ph ph-article text-2xl"></i>
                    <span class="hidden lg:block ml-3 font-medium">Posts</span>
                </button>
                <button data-page="bidders" onclick="window.switchPage('bidders')" class="nav-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
                    <i class="ph ph-users text-2xl"></i>
                    <span class="hidden lg:block ml-3 font-medium">Bidders</span>
                </button>
                <button data-page="openbox" onclick="window.switchPage('openbox')" class="nav-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors relative">
                    <i class="ph ph-package text-2xl"></i>
                    <span class="hidden lg:block ml-3 font-medium">Open Box</span>
                    <span id="openbox-badge" class="absolute top-2 right-2 lg:right-4 bg-indigo-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                </button>
                <button data-page="reports" onclick="window.switchPage('reports')" class="nav-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
                    <i class="ph ph-chart-line-up text-2xl"></i>
                    <span class="hidden lg:block ml-3 font-medium">Reports</span>
                </button>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-200 dark:border-slate-800">
            <button data-page="settings" onclick="window.switchPage('settings')" class="nav-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
                <i class="ph ph-gear text-2xl"></i>
                <span class="hidden lg:block ml-3 font-medium">Settings</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="h-16 flex items-center justify-between px-4 lg:px-8 border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md sticky top-0 z-10 shrink-0">
            <h1 id="page-title" class="text-xl lg:text-2xl font-bold truncate mr-4">Connecting...</h1>
            
            <!-- Global Search Feature -->
            <div class="relative w-full max-w-[200px] lg:max-w-xs" id="global-search-container">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="globalSearchInput" oninput="window.handleSearch(this.value)" placeholder="Search items to edit..." class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow">
                
                <div id="searchResults" class="absolute right-0 top-full mt-2 w-[calc(100vw-2rem)] sm:w-80 lg:w-96 bg-white dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-xl shadow-2xl overflow-hidden hidden flex-col max-h-96 z-50 overflow-y-auto">
                    <!-- Search results injected here -->
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 lg:p-8" id="content-area">
            <div class="flex h-full items-center justify-center">
                <div class="flex flex-col items-center">
                    <i class="ph ph-spinner-gap animate-spin text-4xl text-indigo-500 mb-4"></i>
                    <p class="text-slate-500 dark:text-slate-400">Loading Database...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Modals Container -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <!-- Modal content injected here -->
    </div>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            // YOUR PERSONAL SERVER FALLBACK
            firebaseConfig = {
                apiKey: "AIzaSyCtNDbpP1AfsqZPBkMeBbP-U_Y2owRc4Js",
                authDomain: "facebook-auction-tracker.firebaseapp.com",
                projectId: "facebook-auction-tracker",
                storageBucket: "facebook-auction-tracker.firebasestorage.app",
                messagingSenderId: "936018615344",
                appId: "1:936018615344:web:91a29634684467ba5121f5",
                measurementId: "G-7J35PYN94P"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let userId = null;
        let docRef = null;
        let isInitialized = false;

        // --- State Management ---
        const defaultState = {
            theme: 'dark',
            currentPage: 'dashboard',
            activePostId: null,
            activeShippingPurchaserId: null,
            reportFilterPostIds: ['all'],
            selectedBidderId: null, 
            brands: ['Hot Wheels', 'Matchbox', 'Mini GT', 'Jada', 'Maisto', 'Johnny Lightning'],
            posts: [],
            bidders: [],
            items: []
        };

        let state = null; 

        // Expose all necessary functions to the global scope
        window.switchPage = switchPage;
        window.setTheme = setTheme;
        window.togglePaid = togglePaid;
        window.markBoxPaid = markBoxPaid;
        window.shipBox = shipBox;
        window.resetData = resetData;
        window.updateShippingFee = updateShippingFee;
        window.processShipment = processShipment;
        window.markSold = markSold;
        window.reopenItem = reopenItem;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.submitForm = submitForm;
        window.viewPost = viewPost;
        window.closePostView = closePostView;
        window.applyReportFilter = applyReportFilter;
        window.downloadPickListCSV = downloadPickListCSV;
        window.updatePaymentLink = updatePaymentLink;
        window.copyInvoice = copyInvoice;
        window.updateStoreName = updateStoreName;
        window.confirmDelete = confirmDelete;
        window.executeDelete = executeDelete;
        window.handleSearch = handleSearch;
        window.closeSearch = closeSearch;
        window.selectBidder = selectBidder;
        window.batchDrafts = [];
        window.compressImage = compressImage;
        window.handleBatchFiles = handleBatchFiles;
        window.removeBatchDraft = removeBatchDraft;
        window.renderBatchDrafts = renderBatchDrafts;
        window.resequencePostItems = resequencePostItems;
        
        async function saveState() {
            if (!docRef) return;
            try {
                await setDoc(docRef, state);
            } catch(e) {
                console.error("Error saving to Firebase:", e);
            }
        }

        // --- Auth & Initial Load ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Authentication failed", error);
                document.getElementById('content-area').innerHTML = `<div class="text-rose-500 p-8">Auth Error: ${error.message}</div>`;
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                
                if (typeof __firebase_config !== 'undefined') {
                    docRef = doc(db, 'artifacts', appId, 'users', userId, 'data', 'appState');
                } else {
                    docRef = doc(db, 'users', userId); 
                }
                
                onSnapshot(docRef, (snapshot) => {
                    try {
                        if (snapshot.exists()) {
                            // Defensive mapping: ensures missing data arrays don't cause frozen white screens
                            const data = snapshot.data();
                            const prevBidderId = state ? state.selectedBidderId : null;
                            
                            state = {
                                ...defaultState,
                                ...data,
                                posts: data.posts || [],
                                bidders: data.bidders || [],
                                items: data.items || [],
                                brands: data.brands || defaultState.brands,
                                selectedBidderId: prevBidderId
                            };
                            
                            if (!state.reportFilterPostIds) {
                                state.reportFilterPostIds = state.reportFilterPostId ? [state.reportFilterPostId] : ['all'];
                            }
                        } else {
                            state = defaultState;
                            saveState();
                        }
                        
                        if (!isInitialized) {
                            isInitialized = true;
                            if (state.theme === 'dark') document.documentElement.classList.add('dark');
                            else document.documentElement.classList.remove('dark');
                            switchPage(state.currentPage || 'dashboard');
                        } else {
                            renderCurrentPage();
                            updateBadges();
                        }
                    } catch (err) {
                        console.error("State rendering error:", err);
                        document.getElementById('content-area').innerHTML = `<div class="text-rose-500 bg-rose-50 dark:bg-rose-950 p-6 rounded-xl border border-rose-200 m-8"><h3 class="font-bold mb-2">Critical Rendering Error</h3><p class="text-sm font-mono">${err.message}</p></div>`;
                    }
                }, (error) => {
                    console.error("Firebase Database error:", error);
                    document.getElementById('content-area').innerHTML = `<div class="text-rose-500 p-8">Database Connection Error: ${error.message}</div>`;
                });
            }
        });

        initAuth();

        // --- Image Compression & Batch Logic ---
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        const MAX_HEIGHT = 600;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // Compress to 60% JPEG to fit fast on DB
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function handleBatchFiles(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;
            
            const container = document.getElementById('batch-drafts-container');
            container.innerHTML = '<div class="text-center text-slate-500 py-8 flex flex-col items-center justify-center"><i class="ph ph-spinner-gap animate-spin text-3xl mb-2 text-indigo-500"></i><p>Compressing & loading images...</p></div>';

            for(let file of files) {
                const base64 = await compressImage(file);
                window.batchDrafts.push({ image: base64, name: '' });
            }
            renderBatchDrafts();
            input.value = ''; // Reset input so same file can be selected again if needed
        }

        function removeBatchDraft(index) {
            window.batchDrafts.splice(index, 1);
            renderBatchDrafts();
        }

        function renderBatchDrafts() {
            const container = document.getElementById('batch-drafts-container');
            if (window.batchDrafts.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 text-sm py-8">No photos uploaded yet.</div>';
                return;
            }
            
            container.innerHTML = window.batchDrafts.map((draft, index) => `
                <div class="flex gap-4 items-center bg-slate-50 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-700">
                    <img src="${draft.image}" class="w-16 h-16 object-cover rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 shrink-0" />
                    <input type="text" placeholder="Type Item Name/Description here..." required
                        value="${draft.name.replace(/"/g, '&quot;')}"
                        onchange="window.batchDrafts[${index}].name = this.value"
                        class="flex-1 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-white min-w-[150px]">
                    <button type="button" onclick="window.removeBatchDraft(${index})" class="text-rose-500 p-2 hover:bg-rose-100 dark:hover:bg-rose-900/30 rounded-lg transition-colors shrink-0"><i class="ph ph-trash text-lg"></i></button>
                </div>
            `).join('');
        }

        // --- Sequence Auto-Numbering Logic ---
        function resequencePostItems(postId) {
            const post = state.posts.find(p => p.id === postId);
            if (!post || !post.numberPrefix) return; // Exit if auto-numbering is not active

            const postItems = state.items.filter(i => i.postId === postId);
            
            // Ensure backwards compatibility with older items missing a timestamp
            postItems.forEach(i => { if(!i.createdAt) i.createdAt = Date.now(); });
            
            // Sort by creation time to maintain the exact sequence they were added
            postItems.sort((a, b) => a.createdAt - b.createdAt);

            let currentNum = parseInt(post.numberStart) || 1;
            postItems.forEach(item => {
                const numString = currentNum < 10 ? `0${currentNum}` : `${currentNum}`;
                item.itemNumber = `${post.numberPrefix}${numString}`;
                currentNum++;
            });
        }

        // --- Global Search Logic ---
        function handleSearch(query) {
            const resultsContainer = document.getElementById('searchResults');
            if (!query || query.trim() === '' || !state) {
                resultsContainer.classList.add('hidden');
                return;
            }

            const lowerQuery = query.toLowerCase();
            const matchedItems = state.items.filter(item => 
                (item.name && item.name.toLowerCase().includes(lowerQuery)) ||
                (item.brand && item.brand.toLowerCase().includes(lowerQuery)) ||
                (item.itemNumber && item.itemNumber.toLowerCase().includes(lowerQuery))
            ).slice(0, 10); 

            if (matchedItems.length === 0) {
                resultsContainer.innerHTML = `<div class="p-4 text-center text-sm text-slate-500">No items found matching "${query}"</div>`;
            } else {
                resultsContainer.innerHTML = matchedItems.map(item => {
                    const post = state.posts.find(p => p.id === item.postId);
                    const postName = post ? post.name : 'Unknown Post';
                    const buyer = item.purchaserId ? state.bidders.find(b => b.id === item.purchaserId) : null;
                    
                    return `
                        <div class="p-3 border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors flex justify-between items-center group">
                            <div class="overflow-hidden pr-2 flex items-center gap-3">
                                ${item.image ? `<img src="${item.image}" class="w-8 h-8 rounded object-cover shrink-0">` : ''}
                                <div>
                                    <p class="text-sm font-bold truncate">
                                        ${item.itemNumber ? `<span class="text-xs text-indigo-500 dark:text-indigo-400 mr-1 font-mono">${item.itemNumber}</span>` : ''}
                                        ${item.name}
                                    </p>
                                    <p class="text-[10px] text-slate-500 dark:text-slate-400 truncate">
                                        <i class="ph ph-article"></i> ${postName} 
                                        ${item.status === 'sold' ? `| <i class="ph ph-user"></i> ${buyer ? buyer.name : 'Sold'}` : `| <i class="ph ph-tag"></i> Open`}
                                    </p>
                                </div>
                            </div>
                            <button type="button" onclick="window.closeSearch(); window.openModal('editItem', {itemId: ${item.id}})" class="shrink-0 p-2 bg-sky-50 hover:bg-sky-100 dark:bg-sky-900/30 dark:hover:bg-sky-900/50 text-sky-600 dark:text-sky-400 rounded-lg transition-colors shadow-sm" title="Edit Item">
                                <i class="ph ph-pencil-simple text-lg"></i>
                            </button>
                        </div>
                    `;
                }).join('');
            }
            resultsContainer.classList.remove('hidden');
            resultsContainer.style.display = 'flex'; 
        }

        function closeSearch() {
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.classList.add('hidden');
            resultsContainer.style.display = '';
            document.getElementById('globalSearchInput').value = '';
        }

        document.addEventListener('click', function(event) {
            const searchContainer = document.getElementById('global-search-container');
            if (searchContainer && !searchContainer.contains(event.target)) {
                const resultsContainer = document.getElementById('searchResults');
                if(resultsContainer) {
                    resultsContainer.classList.add('hidden');
                    resultsContainer.style.display = '';
                }
            }
        });

        // --- Core Functions ---
        function generateId() { return Math.floor(Math.random() * 1000000); }

        function switchPage(page) {
            state.currentPage = page;
            if (page !== 'posts') state.activePostId = null; 
            if (page !== 'shipping') state.activeShippingPurchaserId = null;
            saveState();

            const titles = {
                dashboard: 'Dashboard', posts: 'Manage Posts', bidders: 'Bidders Directory',
                openbox: 'Open Box Tracking', reports: 'Sales Reports', settings: 'Settings',
                shipping: 'Generate Packing Slip'
            };
            document.getElementById('page-title').innerText = titles[page] || 'Diecast Tracker';

            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.page === page) {
                    btn.classList.add('bg-indigo-50', 'dark:bg-slate-800', 'text-indigo-600', 'dark:text-indigo-400');
                    btn.classList.remove('text-slate-600', 'dark:text-slate-400');
                } else {
                    btn.classList.remove('bg-indigo-50', 'dark:bg-slate-800', 'text-indigo-600', 'dark:text-indigo-400');
                    btn.classList.add('text-slate-600', 'dark:text-slate-400');
                }
            });
            renderCurrentPage();
            updateBadges();
        }

        function updateBadges() {
            if(!state) return;
            const unshippedCount = state.items.filter(i => i.status === 'sold' && !i.shipped).length;
            const badge = document.getElementById('openbox-badge');
            if (unshippedCount > 0) {
                badge.textContent = unshippedCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount || 0);
        }

        function selectBidder(id) {
            state.selectedBidderId = id;
            renderCurrentPage();
        }

        // --- Rendering Logic ---
        function renderCurrentPage() {
            if(!state) return;
            const content = document.getElementById('content-area');
            content.innerHTML = ''; 

            switch (state.currentPage) {
                case 'dashboard': content.innerHTML = getDashboardHTML(); break;
                case 'posts': content.innerHTML = state.activePostId ? getPostDetailsHTML(state.activePostId) : getPostsHTML(); break;
                case 'bidders': content.innerHTML = getBiddersHTML(); break;
                case 'openbox': content.innerHTML = getOpenBoxHTML(); break;
                case 'reports': content.innerHTML = getReportsHTML(); break;
                case 'settings': content.innerHTML = getSettingsHTML(); break;
                case 'shipping': content.innerHTML = getShippingHTML(); break;
            }
        }

        // 1. Dashboard
        function getDashboardHTML() {
            const activePosts = state.posts.filter(p => p.status === 'active').length;
            const openItems = state.items.filter(i => i.status === 'open').length;
            const revenue = state.items.filter(i => i.status === 'sold').reduce((sum, item) => sum + (item.currentBid || item.startPrice), 0);
            const unshipped = state.items.filter(i => i.status === 'sold' && !i.shipped).length;

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white dark:bg-slate-850 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <div class="flex items-center justify-between text-slate-500 dark:text-slate-400 mb-4">
                            <h3 class="font-medium">Active Posts</h3>
                            <i class="ph ph-article text-2xl text-indigo-500"></i>
                        </div>
                        <p class="text-3xl font-bold">${activePosts}</p>
                    </div>
                    <div class="bg-white dark:bg-slate-850 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <div class="flex items-center justify-between text-slate-500 dark:text-slate-400 mb-4">
                            <h3 class="font-medium">Items for Sale</h3>
                            <i class="ph ph-tag text-2xl text-emerald-500"></i>
                        </div>
                        <p class="text-3xl font-bold">${openItems}</p>
                    </div>
                    <div class="bg-white dark:bg-slate-850 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <div class="flex items-center justify-between text-slate-500 dark:text-slate-400 mb-4">
                            <h3 class="font-medium">Total Revenue</h3>
                            <i class="ph ph-currency-dollar text-2xl text-amber-500"></i>
                        </div>

        // --- Actions & State Updates ---

        function applyReportFilter() {
            const select = document.getElementById('multi-post-filter');
            const selectedValues = Array.from(select.selectedOptions).map(opt => opt.value);
            
            if (selectedValues.length === 0) {
                 state.reportFilterPostIds = ['all'];
            } else if (selectedValues.includes('all') && selectedValues.length > 1) {
                 // Prioritize specific posts over the "all" default when both are highlighted
                 state.reportFilterPostIds = selectedValues.filter(val => val !== 'all');
            } else {
                 state.reportFilterPostIds = selectedValues;
            }
            
            saveState();
            renderCurrentPage();
        }

        function downloadPickListCSV() {
            const filterPostIds = state.reportFilterPostIds || ['all'];
            
            let soldItems = state.items.filter(i => i.status === 'sold');
            if (!filterPostIds.includes('all')) {
                soldItems = soldItems.filter(i => filterPostIds.includes(String(i.postId)));
            }

            if (soldItems.length === 0) {
                window.openModal('error', { message: "No sold items to export for this selection."});
                return;
            }

            // Map and sort by Post Name, then Buyer Name
            const pickList = soldItems.map(item => {
                const bidder = state.bidders.find(b => b.id === item.purchaserId);
                const post = state.posts.find(p => p.id === item.postId);
                return {
                    postName: post ? post.name : 'Unknown Post',
                    buyerName: bidder ? bidder.name : 'Unknown Buyer',
                    itemNumber: item.itemNumber || '-',
                    brand: item.brand || '-',
                    name: item.name || 'Unnamed Item',
                    price: item.currentBid || item.startPrice
                };
            }).sort((a, b) => {
                const postCompare = a.postName.localeCompare(b.postName);
                if (postCompare !== 0) return postCompare;
                return a.buyerName.localeCompare(b.buyerName);
            });

            // Generate CSV Structure
            const headers = ['Post Name', 'Buyer Name', 'Item #', 'Brand', 'Item Description', 'Final Price'];
            const csvRows = [headers.join(',')];

            pickList.forEach(row => {
                const values = [
                    `"${row.postName.replace(/"/g, '""')}"`,
                    `"${row.buyerName.replace(/"/g, '""')}"`,
                    `"${row.itemNumber.replace(/"/g, '""')}"`,
                    `"${row.brand.replace(/"/g, '""')}"`,
                    `"${row.name.replace(/"/g, '""')}"`,
                    row.price
                ];
                csvRows.push(values.join(','));
            });

            const csvString = csvRows.join('\n');
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `Diecast_PickList_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function updatePaymentLink(link) {
            state.paymentLink = link;
            saveState();
        }

        function copyInvoice(purchaserId, btnElement) {
            const bidder = state.bidders.find(b => b.id == purchaserId);
            const items = state.items.filter(i => i.purchaserId === purchaserId && i.status === 'sold' && !i.shipped);
            const totalValue = items.reduce((sum, i) => sum + (i.currentBid || i.startPrice), 0);
            const itemCount = items.length;
            const paymentLink = state.paymentLink ? state.paymentLink : '[Your Payment Link - Add in Settings]';
            
            // Format the message
            const message = `Hey ${bidder.name}! Thanks for grabbing cars in this drop. Your total for ${itemCount} item${itemCount !== 1 ? 's' : ''} is $${totalValue.toFixed(2)} + shipping.\n\nPlease send payment via: ${paymentLink}\n\nThanks!`;

            // Create temporary textarea to execute the copy command
            const textArea = document.createElement("textarea");
            textArea.value = message;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                
                // Temporarily change button to "Copied!" for visual feedback
                const originalText = btnElement.innerHTML;
                btnElement.innerHTML = `<i class="ph ph-check"></i> Copied!`;
                btnElement.classList.add('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-900/50', 'dark:text-emerald-400');
                btnElement.classList.remove('bg-sky-50', 'text-sky-600', 'dark:bg-sky-900/30', 'dark:text-sky-400');
                
                setTimeout(() => {
                    btnElement.innerHTML = originalText;
                    btnElement.classList.remove('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-900/50', 'dark:text-emerald-400');
                    btnElement.classList.add('bg-sky-50', 'text-sky-600', 'dark:bg-sky-900/30', 'dark:text-sky-400');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy', err);
            }
            document.body.removeChild(textArea);
        }

        function updateShippingFee(fee, subtotal) {
            const feeVal = parseFloat(fee) || 0;
            document.getElementById('display-shipping-fee').textContent = formatCurrency(feeVal);
            document.getElementById('display-total').textContent = formatCurrency(subtotal + feeVal);
        }

        function processShipment(purchaserId) {
            window.print();
            
            setTimeout(() => {
                const items = state.items.filter(i => i.purchaserId === purchaserId && i.status === 'sold' && !i.shipped);
                items.forEach(i => i.shipped = true);
                saveState();
                updateBadges();
                switchPage('openbox');
            }, 500);
        }

        function markSold(itemId) {
            const item = state.items.find(i => i.id === itemId);
            if (item && item.type === 'auction') {
                if (!item.purchaserId) {
                    window.openModal('error', { message: "Cannot end auction without any bids. Delete or edit item instead."});
                    return;
                }
                item.status = 'sold';
                item.paid = false;
                item.shipped = false;
                saveState();
                updateBadges();
                renderCurrentPage();
            }
        }

        function reopenItem(itemId) {
             const item = state.items.find(i => i.id === itemId);
             if(item) {
                 item.status = 'open';
                 saveState();
                 updateBadges();
                 renderCurrentPage();
             }
        }

                                        <option value="none" ${item.splitRule === 'none' ? 'selected' : ''}>100% to Me</option>
                                        <option value="50_50" ${item.splitRule === '50_50' ? 'selected' : ''}>50/50 Split</option>
                                        <option value="50_50_under_3" ${item.splitRule === '50_50_under_3' ? 'selected' : ''}>50/50 Split (100% to Other if &lt; $3)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="flex justify-end gap-3">
                                <button type="button" onclick="window.closeModal()" class="px-4 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">Cancel</button>
                                <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition-colors">Save Changes</button>
                            </div>
                        </form>
                    </div>
                `;
            } else if (type === 'addBidder') {
                content = `
                    <div class="bg-white dark:bg-slate-850 p-6 rounded-2xl w-full max-w-md modal-enter border border-slate-200 dark:border-slate-800 shadow-xl">
                        <h2 class="text-xl font-bold mb-4">Add New Bidder</h2>
                        <form id="formAddBidder" onsubmit="window.submitForm(event, 'addBidder')">
                            <div class="space-y-4 mb-6">
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Full Name</label>
                                    <input type="text" name="name" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Profile URL (Optional)</label>
                                    <input type="text" name="profile" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                </div>
                            </div>
                            <div class="flex justify-end gap-3">
                                <button type="button" onclick="window.closeModal()" class="px-4 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">Cancel</button>
                                <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition-colors">Save Bidder</button>
                            </div>
                        </form>
                    </div>
                `;
            } else if (type === 'addBid' || type === 'sellBin') {
                const item = state.items.find(i => i.id === data.itemId);
                const isBin = type === 'sellBin';
                const minBid = item.currentBid ? item.currentBid + 1 : item.startPrice;
                
                content = `
                    <div class="bg-white dark:bg-slate-850 p-6 rounded-2xl w-full max-w-md modal-enter border border-slate-200 dark:border-slate-800 shadow-xl">
                        <h2 class="text-xl font-bold mb-2">${isBin ? 'Mark Sold (BIN)' : 'Place New Bid'}</h2>
                        <div class="flex items-center gap-3 mb-4 bg-slate-50 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-700">
                            ${item.image ? `<img src="${item.image}" class="w-12 h-12 object-cover rounded shadow-sm shrink-0 border border-slate-200 dark:border-slate-600">` : ''}
                            <div>
                                <p class="text-sm font-bold text-slate-900 dark:text-white truncate">${item.name}</p>
                                <p class="text-xs text-slate-500 dark:text-slate-400">${isBin ? `Price: $${item.startPrice}` : `Current: $${item.currentBid || 0} (Min: $${minBid})`}</p>
                            </div>
                        </div>
                        <form id="formTransaction" onsubmit="window.submitForm(event, '${type}', ${data.itemId})">
                            <div class="space-y-4 mb-6">
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Select Buyer</label>
                                    <select name="bidderId" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-white">
                                        <option value="" disabled selected>-- Choose --</option>
                                        ${state.bidders.map(b => `<option value="${b.id}">${b.name}</option>`).join('')}
                                    </select>
                                </div>
                                ${!isBin ? `
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Bid Amount ($)</label>
                                    <input type="number" name="amount" required min="${minBid}" step="1" value="${minBid}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                </div>` : ''}
                            </div>
                            <div class="flex justify-end gap-3">
                                <button type="button" onclick="window.closeModal()" class="px-4 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">Cancel</button>
                                <button type="submit" class="px-4 py-2 ${isBin ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white rounded-xl font-medium transition-colors">${isBin ? 'Confirm Sale' : 'Submit Bid'}</button>
                            </div>
                        </form>
                    </div>
                `;
            }

            container.innerHTML = content;
            container.classList.remove('hidden');
        }

        function closeModal() {
            const container = document.getElementById('modal-container');
            container.classList.add('hidden');
            container.innerHTML = '';
        }

        function confirmDelete(type, id) {
            window.openModal('deleteConfirm', { type, id });
        }

        function executeDelete(type, id) {
            if (type === 'post') {
                state.posts = state.posts.filter(p => p.id !== id);
                state.items = state.items.filter(i => i.postId !== id);
                if (state.activePostId === id) state.activePostId = null;
            } else if (type === 'item') {
                const item = state.items.find(i => i.id === id);
                const postId = item ? item.postId : null;
                state.items = state.items.filter(i => i.id !== id);
                
                // Re-sequence to fill the gap left by deleted item
                if (postId) resequencePostItems(postId); 
            }
            saveState();
            closeModal();
            updateBadges();
            renderCurrentPage();
        }

        async function submitForm(e, type, id) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const values = Object.fromEntries(formData.entries());

            if (type === 'addPost') {
                state.posts.push({
                    id: generateId(),
                    name: values.name,
                    date: values.date,
                    url: values.url,
                    splitRule: values.splitRule || 'none',
                    numberPrefix: values.numberPrefix || '',
                    numberStart: parseInt(values.numberStart) || 1,
                    status: 'active'
                });
            } else if (type === 'editPost') {
                const post = state.posts.find(p => p.id === id);
                if (post) {
                    post.name = values.name;
                    post.date = values.date;
                    post.splitRule = values.splitRule || 'none';
                    post.numberPrefix = values.numberPrefix || '';
                    post.numberStart = parseInt(values.numberStart) || 1;
                    
                    resequencePostItems(post.id);
                }
            } else if (type === 'addItem') {
                if (values.brand && !state.brands.includes(values.brand)) state.brands.push(values.brand);
                
                // Read and compress image if uploaded
                const photoInput = document.getElementById('single-item-photo');
                let base64Image = null;
                if (photoInput && photoInput.files.length > 0) {
                    base64Image = await compressImage(photoInput.files[0]);
                }

                state.items.push({
                    id: generateId(),
                    postId: id,
                    itemNumber: values.itemNumber || '', // Will be overridden if post has Auto-Number
                    brand: values.brand || '',
                    name: values.name,
                    type: values.type,
                    startPrice: parseFloat(values.price),
                    splitRule: values.splitRule || 'post_default',
                    image: base64Image,
                    currentBid: null,
                    purchaserId: null,
                    status: 'open',
                    paid: false,
                    shipped: false,
                    createdAt: Date.now()
                });
                
                resequencePostItems(id);

            } else if (type === 'batchAddItems') {
                const postId = parseInt(values.postId);
                const brand = values.brand;
                if (brand && !state.brands.includes(brand)) state.brands.push(brand);

                window.batchDrafts.forEach((draft, index) => {
                    state.items.push({
                        id: generateId(),
                        postId: postId,
                        itemNumber: '', // Filled by auto-number
                        brand: brand,
                        name: draft.name,
                        type: values.type,
                        startPrice: parseFloat(values.price),
                        splitRule: values.splitRule,
                        image: draft.image,
                        currentBid: null,
                        purchaserId: null,
                        status: 'open',
                        paid: false,
                        shipped: false,
                        createdAt: Date.now() + index // Ensure chronological sequence 
                    });
                });

                resequencePostItems(postId);
                window.batchDrafts = []; // Clear drafts

            } else if (type === 'editItem') {
                const item = state.items.find(i => i.id === id);
                if (item) {
                    if (values.brand && !state.brands.includes(values.brand)) state.brands.push(values.brand);
                    
                    const oldPostId = item.postId;
                    item.postId = parseInt(values.postId);
                    item.itemNumber = values.itemNumber || '';
                    item.brand = values.brand || '';
                    item.name = values.name;
                    item.type = values.type;
                    item.startPrice = parseFloat(values.price);
                    item.splitRule = values.splitRule || 'post_default';
                    
                    // Update photo if new one uploaded
                    const editPhotoInput = document.getElementById('edit-item-photo');
                    if (editPhotoInput && editPhotoInput.files.length > 0) {
                        item.image = await compressImage(editPhotoInput.files[0]);
                    }

                    // Resequence if moved to a different post
                    if (oldPostId !== item.postId) {
                        resequencePostItems(oldPostId);
                        resequencePostItems(item.postId);
                    } else {
                        resequencePostItems(item.postId); // Trigger in case order or itemNumber was touched
                    }
                }
            } else if (type === 'addBidder') {
                state.bidders.push({
                    id: generateId(),
                    name: values.name,
                    profile: values.profile
                });
            } else if (type === 'addBid') {
                const item = state.items.find(i => i.id === id);
                if (item) {
                    item.currentBid = parseFloat(values.amount);
                    item.purchaserId = parseInt(values.bidderId);
                }
            } else if (type === 'sellBin') {
                const item = state.items.find(i => i.id === id);
                if (item) {
                    item.purchaserId = parseInt(values.bidderId);
                    item.status = 'sold';
                    item.paid = false;
                    item.shipped = false;
                }
            }

            saveState();
            closeModal();
            updateBadges();
            renderCurrentPage();
        }

    </script>
</body>
</html>
